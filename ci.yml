name: CI Pipeline

on:
  push:
    branches: [ "develop" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8  # For the linting requirement

    - name: Lint with flake8
      run: |
        # This acts as the "Linting/Formatting" gate
        # stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # exit-zero treats all errors as warnings. 
        # (Remove --exit-zero if you want it to fail the build on style errors)
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Run Tests
      run: |
        # Runs the full test suite automatically
        python -m unittest test_cart.py
